<!-- Portfolio Grid Section -->
    <section id="portfolio">
        <div class="container">
            <div class="row">
                <div class="col-lg-12 text-center">
                    <h2 class="section-heading scroll-reveal">Portfolio</h2>
                    <h3 class="section-subheading scroll-reveal">Recent projects I've worked on for global e-commerce brands.</h3>
                </div>
            </div>
            <div class="row">
            {% for post in site.posts %}
                <div class="col-md-4 col-sm-6 portfolio-item scroll-reveal">
                    <div class="portfolio-card">
                        <a href="#portfolioModal{{ post.modal-id }}" class="portfolio-link" data-toggle="modal">
                            <div class="portfolio-img-wrapper">
                                <div class="portfolio-hover">
                                    <div class="portfolio-hover-content">
                                        <i class="fa fa-search-plus"></i>
                                        <p>View Details</p>
                                    </div>
                                </div>
                                <img src="img/portfolio/{{ post.thumbnail }}" class="img-responsive" alt="{{ post.title }}">
                            </div>
                        </a>
                        <div class="portfolio-info">
                            <div class="portfolio-meta">
                                <span class="portfolio-type">{{ post.category }}</span>
                            </div>
                            <h4 class="portfolio-title">{{ post.title }}</h4>
                            <p class="portfolio-desc">{{ post.description | truncate: 120 }}</p>
                            {% if post.tags %}
                            <div class="portfolio-tags">
                                {% for tag in post.tags %}
                                <span class="portfolio-tag">{{ tag }}</span>
                                {% endfor %}
                            </div>
                            {% endif %}
                        </div>
                    </div>
                </div>
            {% endfor %}
            </div>
        </div>
    </section>
